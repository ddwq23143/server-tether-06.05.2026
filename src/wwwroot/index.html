<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tether | Мессенджер</title>

    <link rel="icon" type="image/jpeg" href="/Assets/Icons/ico.jpg">
    <link rel="apple-touch-icon" href="/Assets/Icons/ico.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #eef2f5;
            color: #111;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: #fff;
            border-bottom: 1px solid #e6e8ea;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #000;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo-img {
            width: 34px;
            height: 34px;
            object-fit: cover;
            border-radius: 10px;
            background: #fff;
            padding: 2px;
            transition: transform 0.2s ease;
        }

        .logo:hover .logo-img {
            transform: scale(1.05);
        }

        .logo-text {
            background: linear-gradient(135deg, #000 0%, #2d2d2d 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #d0d4d9;
            padding: 8px 20px;
            border-radius: 24px;
            font-weight: 500;
            cursor: pointer;
            color: #111;
            transition: all 0.2s ease;
        }

        .btn-outline:hover {
            background: #f0f2f5;
        }

        .btn-primary {
            background: #000;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 24px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: #1f1f1f;
        }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex: 1;
            padding: 20px;
        }

        .hero-text h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #000;
        }

        .form-card {
            background: #fff;
            border: 1px solid #e0e4e8;
            border-radius: 28px;
            padding: 32px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        .form-card.hidden {
            display: none;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 14px;
            padding: 6px 16px;
            margin-top: 8px;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: #000;
            background: #fff;
        }

        .input-wrapper i {
            color: #6c757d;
            margin-right: 10px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 0;
            border: none;
            background: transparent;
            font-size: 1rem;
            outline: none;
        }

        .btn-login, .btn-register {
            width: 100%;
            background: #000;
            color: white;
            padding: 14px;
            border-radius: 28px;
            font-weight: 600;
            border: none;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-login:hover, .btn-register:hover {
            background: #1f1f1f;
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .toggle-link a {
            color: #000;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }

        .messenger-container {
            display: none;
            flex: 1;
            background: #fff;
            overflow: hidden;
        }

        .messenger-layout {
            display: flex;
            height: 100%;
            width: 100%;
        }

        .sidebar {
            width: 320px;
            background: #fff;
            border-right: 1px solid #e6e8ea;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #eef2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .profile-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #6c757d;
            transition: color 0.2s;
            padding: 8px;
            border-radius: 50%;
        }

        .profile-btn:hover {
            color: #000;
            background: #f0f2f5;
        }

        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid #eef2f5;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 24px;
            border: 1px solid #dee2e6;
            background: #f8f9fa;
            outline: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .search-box input:focus {
            border-color: #000;
            background: #fff;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.15s ease;
        }

        .chat-item:hover {
            background: #f4f5f7;
        }

        .chat-item.active {
            background: #e9ecef;
            border-left: 3px solid #000;
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            background: #d9dee3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: #1e1e1e;
            flex-shrink: 0;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid #eef2f5;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fff;
        }

        .message-new {
            animation: messagePop 0.3s ease-out;
        }

        @keyframes messagePop {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            max-width: 65%;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: #e4e6eb;
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #f0f2f5;
            border-bottom-left-radius: 4px;
        }

        .message-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            margin-right: 6px;
        }

        .message-time {
            font-size: 0.65rem;
            color: #8e98a3;
        }

        .status-icon {
            font-size: 0.7rem;
        }

        .status-sent { color: #8e98a3; }
        .status-delivered { color: #5e5e5e; }
        .status-read { color: #34b7f1; }

        .message-input-area {
            padding: 16px 24px;
            border-top: 1px solid #eef2f5;
            display: flex;
            gap: 12px;
            background: #fff;
        }

        .message-input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 28px;
            border: 1px solid #dee2e6;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .message-input-area input:focus {
            border-color: #000;
        }

        .message-input-area button {
            background: #000;
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 28px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .message-input-area button:hover {
            background: #1f1f1f;
        }

        .empty-chat {
            text-align: center;
            color: #8e98a3;
            margin-top: 40px;
        }

        .hidden {
            display: none !important;
        }

        .error-msg, .success-msg {
            padding: 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 12px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .error-msg { background: #fee2e2; color: #b91c1c; }
        .success-msg { background: #dcfce7; color: #15803d; }

        .search-result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #eef2f5;
            cursor: pointer;
        }

        .search-result-item:hover {
            background: #f4f5f7;
        }

        .search-results {
            max-height: 300px;
            overflow-y: auto;
            border-top: 1px solid #eef2f5;
            background: #fff;
        }

        .start-chat-btn {
            background: #000;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .start-chat-btn:hover {
            background: #1f1f1f;
        }

        .section-title {
            padding: 12px 16px 4px 16px;
            font-size: 0.7rem;
            color: #8e98a3;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            border-radius: 28px;
            width: 450px;
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #eef2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6c757d;
            padding: 0 8px;
        }

        .modal-body {
            padding: 24px;
        }

        .profile-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: #000;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 600;
            margin: 0 auto 15px;
        }

        .profile-field {
            margin-bottom: 20px;
        }

        .profile-field label {
            display: block;
            font-size: 0.8rem;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .profile-field .value {
            font-size: 1rem;
            font-weight: 500;
            color: #000;
        }

        .edit-btn {
            background: #000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 24px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: 500;
        }

        .edit-btn:hover {
            background: #1f1f1f;
        }

        .danger-btn {
            background: #dc2626;
        }

        .danger-btn:hover {
            background: #b91c1c;
        }

        .inline-form {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eef2f5;
        }

        .inline-form input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            outline: none;
        }

        .inline-form input:focus {
            border-color: #000;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c7cd;
            border-radius: 10px;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <nav class="navbar">
        <div class="logo" onclick="window.location.reload()">
            <img src="/Assets/Icons/ico.jpg" alt="Tether" class="logo-img"
                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23000%22/%3E%3Ctext x=%2250%22 y=%2267%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22Arial%22%3ET%3C/text%3E%3C/svg%3E'">
            <span class="logo-text">Tether</span>
        </div>
        <div class="nav-buttons" id="navButtons">
            <button class="btn-outline" id="showLoginNavBtn">Вход</button>
            <button class="btn-primary" id="showSignupNavBtn">Регистрация</button>
        </div>
        <div class="nav-buttons hidden" id="navLoggedIn">
            <span id="userWelcomeSpan" style="margin-right: 12px;"></span>
            <button class="btn-outline" id="logoutBtn">Выйти</button>
        </div>
    </nav>

    <div class="hero-section" id="heroSection">
        <div class="hero-text">
            <h1>Простой и быстрый<br>мессенджер</h1>
        </div>
        <div class="form-card" id="loginFormCard">
            <h3>Вход</h3>
            <form id="loginForm">
                <div class="input-group">
                    <label>Логин</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="loginUsername" placeholder="username">
                    </div>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••">
                    </div>
                </div>
                <button type="submit" class="btn-login">Войти</button>
                <div class="toggle-link">
                    Нет аккаунта? <a id="switchToSignup">Создать</a>
                </div>
                <div id="loginMessage"></div>
            </form>
        </div>
        <div class="form-card hidden" id="signupFormCard">
            <h3>Регистрация</h3>
            <form id="signupForm">
                <div class="input-group">
                    <label>Имя</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupUsername">
                    </div>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail">
                    </div>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="signupPassword">
                    </div>
                </div>
                <button type="submit" class="btn-register">Зарегистрироваться</button>
                <div class="toggle-link">
                    Уже есть аккаунт? <a id="switchToLogin">Войти</a>
                </div>
                <div id="signupMessage"></div>
            </form>
        </div>
    </div>

    <div class="messenger-container" id="messengerContainer">
        <div class="messenger-layout">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>Чаты</h2>
                    <button class="profile-btn" onclick="showProfileModal()" title="Мой профиль">
                        <i class="fas fa-user-circle"></i>
                    </button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchUsers" placeholder="Поиск пользователей..." onkeyup="performSearch()">
                </div>
                <div id="searchResults" class="search-results" style="display: none;"></div>
                <div class="section-title" id="chatsTitle">Ваши чаты</div>
                <div class="chats-list" id="chatsList"></div>
            </div>
            <div class="chat-area">
                <div class="chat-header" id="chatHeader">
                    <div class="chat-avatar" id="chatAvatar">?</div>
                    <strong id="chatUserName">Выберите чат</strong>
                </div>
                <div class="messages-area" id="messagesArea">
                    <div class="empty-chat">Выберите диалог</div>
                </div>
                <div class="message-input-area" id="messageInputArea" style="display: none;">
                    <input type="text" id="messageText" placeholder="Сообщение" onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">Отправить</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Мой профиль</h3>
            <button class="close-modal" onclick="closeProfileModal()">&times;</button>
        </div>
        <div class="modal-body" id="profileModalBody">
            <!-- Profile content loaded dynamically -->
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api/Home';
    let currentUser = null;
    let chatUsers = [];
    let selectedUser = null;
    let pollInterval = null;
    let readMessageIds = new Set();
    let lastMessagesHash = '';

    // Helper functions
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.className = `notification ${type === 'success' ? 'success-msg' : 'error-msg'}`;
        notification.innerHTML = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }

    // Profile functions
    async function showProfileModal() {
        if (!currentUser) return;

        try {
            const response = await fetch(`${API_BASE}/profile/${currentUser.userId}`);
            const profile = await response.json();

            if (response.ok) {
                const modalBody = document.getElementById('profileModalBody');
                modalBody.innerHTML = `
                    <div class="profile-info">
                        <div class="profile-avatar">${profile.username[0].toUpperCase()}</div>
                        <h3>${escapeHtml(profile.username)}</h3>
                        <p style="color: #6c757d; font-size: 0.9rem;">ID: ${profile.id}</p>
                    </div>
                    
                    <div class="profile-field">
                        <label>Email</label>
                        <div class="value">${escapeHtml(profile.email)}</div>
                    </div>
                    
                    <div class="profile-field">
                        <label>Дата регистрации</label>
                        <div class="value">${new Date(profile.createdAt).toLocaleDateString('ru-RU')}</div>
                    </div>
                    
                    <div class="profile-field">
                        <label>Последний вход</label>
                        <div class="value">${profile.lastLoginAt ? new Date(profile.lastLoginAt).toLocaleString('ru-RU') : 'Не указано'}</div>
                    </div>
                    
                    <button class="edit-btn" onclick="showEditUsernameForm()">✏️ Изменить имя пользователя</button>
                    <button class="edit-btn" onclick="showChangePasswordForm()" style="margin-top: 10px;">🔒 Сменить пароль</button>
                    
                    <div id="editUsernameForm" style="display: none;" class="inline-form">
                        <h4>Изменить имя пользователя</h4>
                        <input type="text" id="newUsername" placeholder="Новое имя пользователя">
                        <input type="password" id="usernamePassword" placeholder="Введите пароль для подтверждения">
                        <button class="edit-btn" onclick="updateUsernameRequest()">Сохранить</button>
                        <button class="edit-btn" onclick="hideEditUsernameForm()" style="background: #6c757d;">Отмена</button>
                    </div>
                    
                    <div id="changePasswordForm" style="display: none;" class="inline-form">
                        <h4>Смена пароля</h4>
                        <input type="password" id="currentPassword" placeholder="Текущий пароль">
                        <input type="password" id="newPassword" placeholder="Новый пароль (мин. 6 символов)">
                        <input type="password" id="confirmPassword" placeholder="Подтвердите новый пароль">
                        <button class="edit-btn" onclick="changePasswordRequest()">Сменить пароль</button>
                        <button class="edit-btn" onclick="hideChangePasswordForm()" style="background: #6c757d;">Отмена</button>
                    </div>
                `;
                document.getElementById('profileModal').classList.add('active');
            } else {
                showNotification(profile.error || 'Ошибка загрузки профиля', 'error');
            }
        } catch (error) {
            console.error('Profile error:', error);
            showNotification('Ошибка сети при загрузке профиля', 'error');
        }
    }

    function closeProfileModal() {
        document.getElementById('profileModal').classList.remove('active');
    }

    function showEditUsernameForm() {
        document.getElementById('editUsernameForm').style.display = 'block';
        document.getElementById('changePasswordForm').style.display = 'none';
    }

    function hideEditUsernameForm() {
        document.getElementById('editUsernameForm').style.display = 'none';
        document.getElementById('newUsername').value = '';
        document.getElementById('usernamePassword').value = '';
    }

    function showChangePasswordForm() {
        document.getElementById('changePasswordForm').style.display = 'block';
        document.getElementById('editUsernameForm').style.display = 'none';
    }

    function hideChangePasswordForm() {
        document.getElementById('changePasswordForm').style.display = 'none';
        document.getElementById('currentPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
    }

    async function updateUsernameRequest() {
        const newUsername = document.getElementById('newUsername').value.trim();
        const password = document.getElementById('usernamePassword').value;

        if (!newUsername || newUsername.length < 3) {
            showNotification('Имя пользователя должно содержать минимум 3 символа', 'error');
            return;
        }

        if (!password) {
            showNotification('Введите пароль для подтверждения', 'error');
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/updateUsername`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: currentUser.userId,
                    newUsername: newUsername,
                    password: password
                })
            });

            const data = await response.json();

            if (response.ok) {
                currentUser.username = newUsername;
                localStorage.setItem('tether_session', JSON.stringify(currentUser));
                document.getElementById('userWelcomeSpan').innerText = currentUser.username;

                if (selectedUser && selectedUser.id === currentUser.userId) {
                    document.getElementById('chatUserName').innerHTML = currentUser.username;
                    document.getElementById('chatAvatar').innerHTML = currentUser.username[0].toUpperCase();
                }

                showNotification('Имя пользователя успешно обновлено!', 'success');
                closeProfileModal();
                loadChatUsers();
                setTimeout(() => showProfileModal(), 500);
            } else {
                showNotification(data.error || 'Ошибка обновления имени', 'error');
            }
        } catch (error) {
            showNotification('Ошибка сети', 'error');
        }
    }

    async function changePasswordRequest() {
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!currentPassword) {
            showNotification('Введите текущий пароль', 'error');
            return;
        }

        if (!newPassword || newPassword.length < 6) {
            showNotification('Новый пароль должен содержать минимум 6 символов', 'error');
            return;
        }

        if (newPassword !== confirmPassword) {
            showNotification('Пароли не совпадают', 'error');
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/changePassword`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: currentUser.userId,
                    currentPassword: currentPassword,
                    newPassword: newPassword
                })
            });

            const data = await response.json();

            if (response.ok) {
                showNotification('Пароль успешно изменён!', 'success');
                closeProfileModal();
                hideChangePasswordForm();
            } else {
                showNotification(data.error || 'Ошибка смены пароля', 'error');
            }
        } catch (error) {
            showNotification('Ошибка сети', 'error');
        }
    }

    // Improved logout with lastLogoutAt update
    async function logout() {
        if (currentUser) {
            try {
                await fetch(`${API_BASE}/logout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.userId })
                });
            } catch (e) {
                console.error('Logout error:', e);
            }
        }

        localStorage.clear();
        currentUser = null;
        selectedUser = null;
        readMessageIds.clear();
        if (pollInterval) clearInterval(pollInterval);
        showAuthForms();
        showNotification('Вы вышли из системы', 'success');
    }

    // Update last login on successful sign in
    async function updateLastLogin(userId) {
        try {
            await fetch(`${API_BASE}/updateLastLogin`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userId)
            });
        } catch (e) {
            console.error('Update last login error:', e);
        }
    }

    // Existing functions with improvements
    function loadSession() {
        const stored = localStorage.getItem('tether_session');
        if(stored) {
            try {
                const s = JSON.parse(stored);
                if(s.userId && s.username) {
                    currentUser = s;
                    showMessenger();
                    loadChatUsers();
                    startPolling();
                    updateLastLogin(currentUser.userId);
                } else showAuthForms();
            } catch(e) { showAuthForms(); }
        } else showAuthForms();
    }

    function showMessenger() {
        document.getElementById('heroSection').style.display = 'none';
        document.getElementById('messengerContainer').style.display = 'flex';
        document.getElementById('navButtons').classList.add('hidden');
        document.getElementById('navLoggedIn').classList.remove('hidden');
        document.getElementById('userWelcomeSpan').innerText = currentUser.username;
    }

    function showAuthForms() {
        document.getElementById('heroSection').style.display = 'flex';
        document.getElementById('messengerContainer').style.display = 'none';
        document.getElementById('navButtons').classList.remove('hidden');
        document.getElementById('navLoggedIn').classList.add('hidden');
        document.getElementById('loginFormCard').classList.remove('hidden');
        document.getElementById('signupFormCard').classList.add('hidden');
        if(pollInterval) clearInterval(pollInterval);
        selectedUser = null;
        readMessageIds.clear();
    }

    async function loadChatUsers() {
        if (!currentUser) return;

        try {
            const res = await fetch(`${API_BASE}/searchUsers?currentUserId=${currentUser.userId}`);
            if(res.ok) {
                const allUsers = await res.json();
                const newChatUsers = allUsers.filter(u => u.hasChat === true);

                const newIds = newChatUsers.map(u => u.id).sort().join(',');
                const oldIds = chatUsers.map(u => u.id).sort().join(',');

                if (newIds !== oldIds) {
                    chatUsers = newChatUsers;
                    renderChatsList();
                }
            }
        } catch(e) {
            console.error(e);
        }
    }

    function renderChatsList() {
        const container = document.getElementById('chatsList');
        const chatsTitle = document.getElementById('chatsTitle');

        if(chatUsers.length === 0) {
            chatsTitle.style.display = 'none';
            container.innerHTML = '<div style="padding:20px; text-align:center; color:#8e98a3;">Нет чатов</div>';
            return;
        }

        chatsTitle.style.display = 'block';
        container.innerHTML = chatUsers.map(u => `
            <div class="chat-item ${selectedUser?.id === u.id ? 'active' : ''}" onclick="selectUser(${u.id}, '${escapeHtml(u.username)}')">
                <div class="chat-avatar">${escapeHtml(u.username[0].toUpperCase())}</div>
                <div><strong>${escapeHtml(u.username)}</strong></div>
            </div>
        `).join('');
    }

    async function performSearch() {
        const searchTerm = document.getElementById('searchUsers').value.trim();
        const searchResultsDiv = document.getElementById('searchResults');
        const chatsTitle = document.getElementById('chatsTitle');

        if (!searchTerm) {
            searchResultsDiv.style.display = 'none';
            chatsTitle.style.display = chatUsers.length > 0 ? 'block' : 'none';
            return;
        }

        try {
            const res = await fetch(`${API_BASE}/searchUsers?currentUserId=${currentUser.userId}&query=${encodeURIComponent(searchTerm)}`);
            if(res.ok) {
                const results = await res.json();
                const newUsers = results.filter(u =>
                    u.id !== currentUser.userId &&
                    !chatUsers.some(chat => chat.id === u.id)
                );

                if (newUsers.length > 0) {
                    searchResultsDiv.style.display = 'block';
                    chatsTitle.style.display = 'none';
                    searchResultsDiv.innerHTML = `
                        <div class="section-title">Результаты поиска</div>
                        ${newUsers.map(u => `
                            <div class="search-result-item">
                                <div>
                                    <strong>${escapeHtml(u.username)}</strong>
                                    <div style="font-size:0.7rem; color:#8e98a3;">ID: ${u.id}</div>
                                </div>
                                <button class="start-chat-btn" onclick="startNewChat(${u.id}, '${escapeHtml(u.username)}')">Написать</button>
                            </div>
                        `).join('')}
                    `;
                } else {
                    searchResultsDiv.style.display = 'block';
                    searchResultsDiv.innerHTML = `<div class="section-title" style="text-align:center;">Пользователь не найден</div>`;
                }
            }
        } catch(e) {
            console.error(e);
        }
    }

    async function startNewChat(userId, username) {
        const newChatUser = { id: userId, username: username, hasChat: true };
        chatUsers.push(newChatUser);
        renderChatsList();

        document.getElementById('searchUsers').value = '';
        document.getElementById('searchResults').style.display = 'none';
        document.getElementById('chatsTitle').style.display = 'block';

        await selectUser(userId, username);
    }

    function getStatusIcon(status) {
        switch(status) {
            case 'Sent': return '<i class="fas fa-check status-icon status-sent"></i>';
            case 'Delivered': return '<i class="fas fa-check-double status-icon status-delivered"></i>';
            case 'Read': return '<i class="fas fa-check-double status-icon status-read"></i>';
            default: return '<i class="fas fa-check status-icon status-sent"></i>';
        }
    }

    async function callMarkDelivered(senderId, receiverId) {
        try {
            await fetch(`${API_BASE}/markDelivered?senderId=${senderId}&receiverId=${receiverId}`, { method: 'POST' });
        } catch(e) {}
    }

    async function callMarkRead(senderId, receiverId) {
        try {
            await fetch(`${API_BASE}/markRead?senderId=${senderId}&receiverId=${receiverId}`, { method: 'POST' });
        } catch(e) {}
    }

    function checkVisibleMessages() {
        if(!selectedUser) return;
        const messagesArea = document.getElementById('messagesArea');
        const messages = messagesArea.querySelectorAll('.message.received');
        let hasVisible = false;
        messages.forEach(msg => {
            const rect = msg.getBoundingClientRect();
            const containerRect = messagesArea.getBoundingClientRect();
            if (rect.top >= containerRect.top && rect.top <= containerRect.bottom) {
                const msgId = msg.getAttribute('data-msg-id');
                if(msgId && !readMessageIds.has(msgId)) {
                    hasVisible = true;
                    readMessageIds.add(msgId);
                }
            }
        });
        if(hasVisible) {
            callMarkRead(selectedUser.id, currentUser.userId);
            setTimeout(() => loadMessages(true), 100);
        }
    }

    async function selectUser(userId, username) {
        if (selectedUser?.id === userId) return;

        selectedUser = { id: userId, username };
        document.getElementById('chatUserName').innerHTML = username;
        document.getElementById('chatAvatar').innerHTML = username[0].toUpperCase();
        document.getElementById('messageInputArea').style.display = 'flex';
        renderChatsList();
        readMessageIds.clear();
        lastMessagesHash = '';
        await callMarkDelivered(currentUser.userId, selectedUser.id);
        await loadMessages(false);
        const messagesArea = document.getElementById('messagesArea');
        messagesArea.removeEventListener('scroll', checkVisibleMessages);
        messagesArea.addEventListener('scroll', () => setTimeout(checkVisibleMessages, 100));
        setTimeout(checkVisibleMessages, 500);
    }

    async function loadMessages(keepPos = true) {
        if(!selectedUser) return;
        const area = document.getElementById('messagesArea');
        let oldScrollTop = 0, oldScrollHeight = 0, wasNearBottom = false;
        if(keepPos && area) {
            oldScrollTop = area.scrollTop;
            oldScrollHeight = area.scrollHeight;
            wasNearBottom = (oldScrollHeight - oldScrollTop - area.clientHeight) < 80;
        }
        try {
            const res = await fetch(`${API_BASE}/getMessages?senderId=${currentUser.userId}&receiverId=${selectedUser.id}`);
            const msgs = await res.json();
            if(msgs.error || !Array.isArray(msgs)) return;

            const newHash = msgs.map(m => `${m.id}_${m.status}`).join(',');

            if (newHash !== lastMessagesHash) {
                const oldMessageIds = new Set(Array.from(area.querySelectorAll('.message[data-msg-id]')).map(el => el.getAttribute('data-msg-id')));
                const newMessageIds = new Set(msgs.map(m => m.id.toString()));

                const newMessages = msgs.filter(m => !oldMessageIds.has(m.id.toString()));

                area.innerHTML = msgs.map(msg => {
                    const isSent = msg.senderId === currentUser.userId;
                    const time = new Date(msg.sendAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    const status = msg.status || 'Sent';
                    const isNew = newMessages.some(nm => nm.id === msg.id);

                    return `
                        <div class="message ${isSent ? 'sent' : 'received'} ${isNew ? 'message-new' : ''}" data-msg-id="${msg.id}">
                            <div class="message-bubble">${escapeHtml(msg.text)}</div>
                            <div class="message-footer">
                                <span class="message-time">${time}</span>
                                ${isSent ? `<span class="status-icon">${getStatusIcon(status)}</span>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');

                lastMessagesHash = newHash;

                if(keepPos && area && wasNearBottom) {
                    area.scrollTop = area.scrollHeight;
                }
            }
            setTimeout(checkVisibleMessages, 100);
        } catch(e) { console.error(e); }
    }

    async function sendMessage() {
        const text = document.getElementById('messageText').value.trim();
        if(!text || !selectedUser) return;

        const tempId = 'temp_' + Date.now();
        const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const area = document.getElementById('messagesArea');
        const tempHtml = `
            <div class="message sent message-new" data-temp="${tempId}">
                <div class="message-bubble">${escapeHtml(text)}</div>
                <div class="message-footer">
                    <span class="message-time">${time}</span>
                    <span class="status-icon"><i class="fas fa-circle-notch fa-spin"></i></span>
                </div>
            </div>
        `;
        area.insertAdjacentHTML('beforeend', tempHtml);
        area.scrollTop = area.scrollHeight;
        document.getElementById('messageText').value = '';

        try {
            const res = await fetch(`${API_BASE}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    senderId: currentUser.userId,
                    receiverId: selectedUser.id,
                    text: text
                })
            });
            if(res.ok) {
                document.querySelector(`[data-temp="${tempId}"]`)?.remove();
                lastMessagesHash = '';
                await loadMessages(false);
                await callMarkDelivered(currentUser.userId, selectedUser.id);
            } else {
                const tempSpan = document.querySelector(`[data-temp="${tempId}"] .status-icon`);
                if(tempSpan) tempSpan.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#b91c1c;"></i>';
            }
        } catch(e) { console.error(e); }
    }

    function startPolling() {
        if(pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(async () => {
            if(selectedUser && currentUser) {
                await loadMessages(true);
                await callMarkDelivered(currentUser.userId, selectedUser.id);
                checkVisibleMessages();
            }
            await loadChatUsers();
        }, 3000);
    }

    async function signUpRequest(login, email, pwd) {
        try {
            const r = await fetch(`${API_BASE}/signUp`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ username:login, email, password:pwd })
            });
            const d = await r.json();
            if(r.ok) {
                displayMessage('signupMessage', 'Регистрация успешна', false);
                setTimeout(() => document.getElementById('switchToLogin').click(), 1300);
            } else displayMessage('signupMessage', d.error || 'Ошибка', true);
        } catch(e) { displayMessage('signupMessage', 'Ошибка сети', true); }
    }

    async function signInRequest(login, pwd) {
        try {
            const r = await fetch(`${API_BASE}/signIn`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ username:login, password:pwd })
            });
            const d = await r.json();
            if(r.ok && d.userId) {
                currentUser = { userId: d.userId, username: d.username };
                localStorage.setItem('tether_session', JSON.stringify(currentUser));
                showMessenger();
                await loadChatUsers();
                startPolling();
                await updateLastLogin(currentUser.userId);
                showNotification(`Добро пожаловать, ${d.username}!`, 'success');
            } else displayMessage('loginMessage', d.message || 'Ошибка входа', true);
        } catch(e) { displayMessage('loginMessage', 'Ошибка сети', true); }
    }

    function displayMessage(containerId, msg, isErr) {
        const c = document.getElementById(containerId);
        c.innerHTML = `<div class="${isErr ? 'error-msg' : 'success-msg'}">${msg}</div>`;
        setTimeout(() => c.innerHTML = '', 3000);
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;';
            if(m==='<') return '&lt;';
            if(m==='>') return '&gt;';
            return m;
        });
    }

    // Event listeners
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        signInRequest(
            document.getElementById('loginUsername').value.trim(),
            document.getElementById('loginPassword').value
        );
    });

    document.getElementById('signupForm').addEventListener('submit', (e) => {
        e.preventDefault();
        signUpRequest(
            document.getElementById('signupUsername').value.trim(),
            document.getElementById('signupEmail').value.trim(),
            document.getElementById('signupPassword').value
        );
    });

    document.getElementById('switchToSignup').onclick = () => {
        document.getElementById('loginFormCard').classList.add('hidden');
        document.getElementById('signupFormCard').classList.remove('hidden');
    };

    document.getElementById('switchToLogin').onclick = () => {
        document.getElementById('signupFormCard').classList.add('hidden');
        document.getElementById('loginFormCard').classList.remove('hidden');
    };

    document.getElementById('showLoginNavBtn').onclick = () => document.getElementById('switchToLogin').click();
    document.getElementById('showSignupNavBtn').onclick = () => document.getElementById('switchToSignup').click();
    document.getElementById('logoutBtn').onclick = logout;

    // Close modal when clicking outside
    window.onclick = function(event) {
        const modal = document.getElementById('profileModal');
        if (event.target === modal) {
            closeProfileModal();
        }
    }

    loadSession();
</script>
</body>
</html>
