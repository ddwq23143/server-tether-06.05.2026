<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отправка сообщений на C# API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
<h2>Отправить сообщение на сервер C#</h2>

<form id="messageForm">
    <div class="form-group">
        <label for="username">Имя пользователя:</label>
        <input type="text" id="username" name="Username" required />
    </div>

    <div class="form-group">
        <label for="message">Сообщение:</label>
        <textarea id="message" name="Message" required></textarea>
    </div>

    <button type="submit">Отправить</button>
</form>

<div id="result"></div>

<script>
    // URL вашего API (проверьте порт - у вас 5058)
    const API_URL = 'http://localhost:5058/api/home/savemessage';

    // Обработчик отправки формы
    document.getElementById('messageForm').addEventListener('submit', async function(event) {
        event.preventDefault(); // Отменяем стандартную отправку формы

        // Получаем данные из полей
        const username = document.getElementById('username').value.trim();
        const message = document.getElementById('message').value.trim();

        // Простая валидация
        if (!username || !message) {
            showResult('Пожалуйста, заполните все поля!', 'error');
            return;
        }

        // Создаем FormData для отправки (соответствует [FromForm])
        const formData = new FormData();
        formData.append('Username', username);  // Имя должно совпадать со свойством в модели C#
        formData.append('Message', message);    // Имя должно совпадать со свойством в модели C#

        try {
            // Отправляем POST запрос на сервер
            const response = await fetch(API_URL, {
                method: 'POST',
                body: formData  // Отправляем как form-data
            });

            if (response.ok) {
                showResult(`✅ Успешно! Сообщение от "${username}" сохранено на сервере.`, 'success');
                // Очищаем форму
                document.getElementById('messageForm').reset();
            } else {
                const errorText = await response.text();
                showResult(`❌ Ошибка сервера: ${response.status} - ${errorText}`, 'error');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            showResult(`❌ Не удалось соединиться с сервером. Убедитесь, что сервер запущен на ${API_URL}`, 'error');
        }
    });

    function showResult(message, type) {
        const resultDiv = document.getElementById('result');
        resultDiv.textContent = message;
        resultDiv.className = type;
        resultDiv.style.display = 'block';

        // Скрываем сообщение через 5 секунд
        setTimeout(() => {
            resultDiv.style.display = 'none';
        }, 5000);
    }

    // Проверка соединения с сервером при загрузке страницы (опционально)
    async function checkServerConnection() {
        try {
            const response = await fetch(API_URL, { method: 'OPTIONS' });
            console.log('Сервер доступен');
        } catch (error) {
            console.warn('Сервер не доступен. Запустите серверное приложение.');
            showResult('⚠️ Сервер не запущен. Запустите ваш C# проект.', 'error');
        }
    }

    // Проверяем соединение при загрузке
    checkServerConnection();
</script>
</body>
</html>
