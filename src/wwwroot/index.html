<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отправка сообщений на C# API</title>
</head>
<body>
<h2>Отправить сообщение на сервер C#</h2>
<form id="messageForm">
    <div class="form-group">
        <label for="username">Имя пользователя:</label>
        <input type="text" id="username" name="Username" required />
    </div>

    <div class="form-group">
        <label for="message">Сообщение:</label>
        <textarea id="message" name="Message" required></textarea>
    </div>
    <button type="submit">Отправить</button>
</form>
<div id="result"></div>
<script>
    const API_URL = 'http://localhost:5058/api/home/savemessage';
    document.getElementById('messageForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        const username = document.getElementById('username').value.trim();
        const message = document.getElementById('message').value.trim();
        if (!username || !message) {
            showResult('Пожалуйста, заполните все поля!', 'error');
            return;
        }
        const formData = new FormData();
        formData.append('Username', username);
        formData.append('Message', message); 
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: formData
            });
            if (response.ok) {
                showResult(`✅ Успешно! Сообщение от "${username}" сохранено на сервере.`, 'success');
                document.getElementById('messageForm').reset();
            } else {
                const errorText = await response.text();
                showResult(`❌ Ошибка сервера: ${response.status} - ${errorText}`, 'error');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            showResult(`❌ Не удалось соединиться с сервером. Убедитесь, что сервер запущен на ${API_URL}`, 'error');
        }
    });
    function showResult(message, type) {
        const resultDiv = document.getElementById('result');
        resultDiv.textContent = message;
        resultDiv.className = type;
        resultDiv.style.display = 'block';
        setTimeout(() => {
            resultDiv.style.display = 'none';
        }, 5000);
    }
    async function checkServerConnection() {
        try {
            const response = await fetch(API_URL, { method: 'OPTIONS' });
            console.log('Сервер доступен');
        } catch (error) {
            console.warn('Сервер не доступен. Запустите серверное приложение.');
            showResult('⚠️ Сервер не запущен. Запустите ваш C# проект.', 'error');
        }
    }
    checkServerConnection();
</script>
</body>
</html>
