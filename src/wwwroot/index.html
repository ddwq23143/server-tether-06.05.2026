<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tether | Мессенджер</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #eef2f5;
            color: #111;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: #fff;
            border-bottom: 1px solid #e6e8ea;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #000;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #d0d4d9;
            padding: 8px 20px;
            border-radius: 24px;
            font-weight: 500;
            cursor: pointer;
            color: #111;
        }

        .btn-outline:hover {
            background: #f0f2f5;
        }

        .btn-primary {
            background: #000;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 24px;
            font-weight: 500;
            cursor: pointer;
        }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex: 1;
            padding: 20px;
        }

        .hero-text h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #000;
        }

        .form-card {
            background: #fff;
            border: 1px solid #e0e4e8;
            border-radius: 28px;
            padding: 32px;
            width: 400px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 14px;
            padding: 6px 16px;
            margin-top: 8px;
        }

        .input-wrapper i {
            color: #6c757d;
            margin-right: 10px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 0;
            border: none;
            background: transparent;
            font-size: 1rem;
            outline: none;
        }

        .btn-login, .btn-register {
            width: 100%;
            background: #000;
            color: white;
            padding: 14px;
            border-radius: 28px;
            font-weight: 600;
            border: none;
            margin-top: 20px;
            cursor: pointer;
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .toggle-link a {
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }

        .messenger-container {
            display: none;
            flex: 1;
            background: #fff;
            overflow: hidden;
        }

        .messenger-layout {
            display: flex;
            height: 100%;
            width: 100%;
        }

        .sidebar {
            width: 320px;
            background: #fff;
            border-right: 1px solid #e6e8ea;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #eef2f5;
        }

        .sidebar-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .search-box {
            padding: 12px 16px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 24px;
            border: 1px solid #dee2e6;
            background: #f8f9fa;
            outline: none;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            cursor: pointer;
            transition: 0.1s;
        }

        .chat-item:hover {
            background: #f4f5f7;
        }

        .chat-item.active {
            background: #e9ecef;
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            background: #d9dee3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: #1e1e1e;
            flex-shrink: 0;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid #eef2f5;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #fff;
        }

        .message {
            max-width: 65%;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: #e4e6eb;
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #f0f2f5;
            border-bottom-left-radius: 4px;
        }

        .message-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            margin-right: 6px;
        }

        .message-time {
            font-size: 0.65rem;
            color: #8e98a3;
        }

        .status-icon {
            font-size: 0.7rem;
        }

        .status-sent { color: #8e98a3; }
        .status-delivered { color: #5e5e5e; }
        .status-read { color: #34b7f1; }

        .message-input-area {
            padding: 16px 24px;
            border-top: 1px solid #eef2f5;
            display: flex;
            gap: 12px;
            background: #fff;
        }

        .message-input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 28px;
            border: 1px solid #dee2e6;
            outline: none;
            font-size: 0.95rem;
        }

        .message-input-area button {
            background: #000;
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 28px;
            font-weight: 500;
            cursor: pointer;
        }

        .empty-chat {
            text-align: center;
            color: #8e98a3;
            margin-top: 40px;
        }

        .hidden {
            display: none;
        }

        .error-msg, .success-msg {
            padding: 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 12px;
            text-align: center;
        }
        .error-msg { background: #fee2e2; color: #b91c1c; }
        .success-msg { background: #dcfce7; color: #15803d; }
    </style>
</head>
<body>
<div class="container">
    <nav class="navbar">
        <div class="logo">Tether</div>
        <div class="nav-buttons" id="navButtons">
            <button class="btn-outline" id="showLoginNavBtn">Вход</button>
            <button class="btn-primary" id="showSignupNavBtn">Регистрация</button>
        </div>
        <div class="nav-buttons hidden" id="navLoggedIn">
            <span id="userWelcomeSpan" style="margin-right: 12px;"></span>
            <button class="btn-outline" id="logoutBtn">Выйти</button>
        </div>
    </nav>

    <div class="hero-section" id="heroSection">
        <div class="hero-text">
            <h1>Простой и быстрый<br>мессенджер</h1>
        </div>
        <div class="form-card" id="loginFormCard">
            <h3>Вход</h3>
            <form id="loginForm">
                <div class="input-group">
                    <label>Логин</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="loginUsername" placeholder="username">
                    </div>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••">
                    </div>
                </div>
                <button type="submit" class="btn-login">Войти</button>
                <div class="toggle-link">
                    Нет аккаунта? <a id="switchToSignup">Создать</a>
                </div>
                <div id="loginMessage"></div>
            </form>
        </div>
        <div class="form-card hidden" id="signupFormCard">
            <h3>Регистрация</h3>
            <form id="signupForm">
                <div class="input-group">
                    <label>Имя</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupUsername">
                    </div>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail">
                    </div>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="signupPassword">
                    </div>
                </div>
                <button type="submit" class="btn-register">Зарегистрироваться</button>
                <div class="toggle-link">
                    Уже есть аккаунт? <a id="switchToLogin">Войти</a>
                </div>
                <div id="signupMessage"></div>
            </form>
        </div>
    </div>

    <div class="messenger-container" id="messengerContainer">
        <div class="messenger-layout">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>Чаты</h2>
                </div>
                <div class="search-box">
                    <input type="text" id="searchUsers" placeholder="Поиск" onkeyup="filterUsers()">
                </div>
                <div class="chats-list" id="chatsList"></div>
            </div>
            <div class="chat-area">
                <div class="chat-header" id="chatHeader">
                    <div class="chat-avatar" id="chatAvatar">?</div>
                    <strong id="chatUserName">Выберите чат</strong>
                </div>
                <div class="messages-area" id="messagesArea">
                    <div class="empty-chat">Выберите диалог</div>
                </div>
                <div class="message-input-area" id="messageInputArea" style="display: none;">
                    <input type="text" id="messageText" placeholder="Сообщение" onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">→</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api/Home';
    let currentUser = null;
    let allUsers = [];
    let selectedUser = null;
    let pollInterval = null;
    let readMessageIds = new Set(); // ID сообщений, которые уже отмечены как прочитанные

    function loadSession() {
        const stored = localStorage.getItem('tether_session');
        if(stored) {
            try {
                const s = JSON.parse(stored);
                if(s.userId && s.username) {
                    currentUser = s;
                    showMessenger();
                    loadUsers();
                    startPolling();
                } else showAuthForms();
            } catch(e) { showAuthForms(); }
        } else showAuthForms();
    }

    function showMessenger() {
        document.getElementById('heroSection').style.display = 'none';
        document.getElementById('messengerContainer').style.display = 'flex';
        document.getElementById('navButtons').classList.add('hidden');
        document.getElementById('navLoggedIn').classList.remove('hidden');
        document.getElementById('userWelcomeSpan').innerText = currentUser.username;
    }

    function showAuthForms() {
        document.getElementById('heroSection').style.display = 'flex';
        document.getElementById('messengerContainer').style.display = 'none';
        document.getElementById('navButtons').classList.remove('hidden');
        document.getElementById('navLoggedIn').classList.add('hidden');
        document.getElementById('loginFormCard').classList.remove('hidden');
        document.getElementById('signupFormCard').classList.add('hidden');
        if(pollInterval) clearInterval(pollInterval);
        selectedUser = null;
        readMessageIds.clear();
    }

    async function loadUsers() {
        try {
            const res = await fetch(`${API_BASE}/users`);
            if(res.ok) allUsers = await res.json();
            renderUsersList();
        } catch(e) { console.error(e); }
    }

    function renderUsersList() {
        const container = document.getElementById('chatsList');
        const search = document.getElementById('searchUsers').value.toLowerCase();
        const filtered = allUsers.filter(u => u.id !== currentUser?.userId && u.username.toLowerCase().includes(search));
        if(!filtered.length) { container.innerHTML = '<div style="padding:20px">Нет пользователей</div>'; return; }
        container.innerHTML = filtered.map(u => `
            <div class="chat-item ${selectedUser?.id === u.id ? 'active' : ''}" onclick="selectUser(${u.id}, '${escapeHtml(u.username)}')">
                <div class="chat-avatar">${u.username[0].toUpperCase()}</div>
                <div><strong>${escapeHtml(u.username)}</strong></div>
            </div>
        `).join('');
    }

    function filterUsers() { renderUsersList(); }

    function getStatusIcon(status) {
        switch(status) {
            case 'Sent': return '<i class="fas fa-check status-icon status-sent"></i>';
            case 'Delivered': return '<i class="fas fa-check-double status-icon status-delivered"></i>';
            case 'Read': return '<i class="fas fa-check-double status-icon status-read"></i>';
            default: return '<i class="fas fa-check status-icon status-sent"></i>';
        }
    }

    // ========== ТВОИ API ==========
    async function callMarkDelivered(senderId, receiverId) {
        try {
            await fetch(`${API_BASE}/markDelivered?senderId=${senderId}&receiverId=${receiverId}`, { method: 'POST' });
            return true;
        } catch(e) { return false; }
    }

    async function callMarkRead(senderId, receiverId, messageId) {
        try {
            // markRead помечает ВСЕ сообщения от senderId к receiverId как прочитанные
            await fetch(`${API_BASE}/markRead?senderId=${senderId}&receiverId=${receiverId}`, { method: 'POST' });
            return true;
        } catch(e) { return false; }
    }

    // Проверка видимости сообщений и отметка прочитанных
    function checkVisibleMessages() {
        if(!selectedUser) return;

        const messagesArea = document.getElementById('messagesArea');
        const messages = messagesArea.querySelectorAll('.message.received');
        const scrollTop = messagesArea.scrollTop;
        const clientHeight = messagesArea.clientHeight;

        let maxVisibleMessageId = null;
        let maxVisibleTimestamp = 0;

        messages.forEach(msg => {
            const rect = msg.getBoundingClientRect();
            const containerRect = messagesArea.getBoundingClientRect();
            const isVisible = rect.top >= containerRect.top && rect.top <= containerRect.bottom;

            if(isVisible) {
                const msgId = msg.getAttribute('data-msg-id');
                if(msgId && !readMessageIds.has(msgId)) {
                    const timestamp = parseInt(msg.getAttribute('data-timestamp') || '0');
                    if(timestamp > maxVisibleTimestamp) {
                        maxVisibleTimestamp = timestamp;
                        maxVisibleMessageId = msgId;
                    }
                }
            }
        });

        // Если есть видимое непрочитанное сообщение, отмечаем его и все предыдущие как прочитанные
        if(maxVisibleMessageId) {
            // Отмечаем через API все сообщения от этого пользователя
            callMarkRead(selectedUser.id, currentUser.userId, maxVisibleMessageId).then(() => {
                // Обновляем статусы в UI
                setTimeout(() => loadMessages(true), 100);
            });
            readMessageIds.add(maxVisibleMessageId);
        }
    }

    async function selectUser(userId, username) {
        selectedUser = { id: userId, username };
        document.getElementById('chatUserName').innerHTML = username;
        document.getElementById('chatAvatar').innerHTML = username[0].toUpperCase();
        document.getElementById('messageInputArea').style.display = 'flex';
        renderUsersList();
        readMessageIds.clear();

        // При открытии чата отмечаем сообщения как доставленные (НО НЕ КАК ПРОЧИТАННЫЕ)
        await callMarkDelivered(currentUser.userId, selectedUser.id);

        await loadMessages(false);

        // Добавляем обработчик скролла для отслеживания прочитанных сообщений
        const messagesArea = document.getElementById('messagesArea');
        messagesArea.removeEventListener('scroll', checkVisibleMessages);
        messagesArea.addEventListener('scroll', () => {
            setTimeout(checkVisibleMessages, 100);
        });
        setTimeout(checkVisibleMessages, 500);
    }

    async function loadMessages(keepPos = true) {
        if(!selectedUser) return;

        const area = document.getElementById('messagesArea');
        let oldScrollTop = 0, oldScrollHeight = 0, wasNearBottom = false;

        if(keepPos && area) {
            oldScrollTop = area.scrollTop;
            oldScrollHeight = area.scrollHeight;
            wasNearBottom = (oldScrollHeight - oldScrollTop - area.clientHeight) < 80;
        }

        try {
            const res = await fetch(`${API_BASE}/getMessages?senderId=${currentUser.userId}&receiverId=${selectedUser.id}`);
            const msgs = await res.json();

            if(msgs.error || !Array.isArray(msgs)) return;

            // Проверяем, есть ли новые сообщения
            const existingIds = new Set();
            document.querySelectorAll('.message[data-msg-id]').forEach(el => {
                existingIds.add(el.getAttribute('data-msg-id'));
            });

            const newIds = new Set(msgs.map(m => m.id.toString()));
            const hasNewMessages = existingIds.size !== newIds.size;

            if(hasNewMessages) {
                area.innerHTML = msgs.map(msg => {
                    const isSent = msg.senderId === currentUser.userId;
                    const time = new Date(msg.sendAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    const status = msg.status || 'Sent';
                    const timestamp = new Date(msg.sendAt).getTime();

                    return `
                        <div class="message ${isSent ? 'sent' : 'received'}" data-msg-id="${msg.id}" data-timestamp="${timestamp}">
                            <div class="message-bubble">${escapeHtml(msg.text)}</div>
                            <div class="message-footer">
                                <span class="message-time">${time}</span>
                                ${isSent ? `<span class="status-icon">${getStatusIcon(status)}</span>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                // Обновляем только статусы отправленных сообщений
                for(let msg of msgs) {
                    if(msg.senderId === currentUser.userId) {
                        const statusSpan = document.querySelector(`.message[data-msg-id="${msg.id}"] .status-icon`);
                        if(statusSpan && msg.status) {
                            const newIcon = getStatusIcon(msg.status);
                            if(statusSpan.innerHTML !== newIcon) {
                                statusSpan.innerHTML = newIcon;
                            }
                        }
                    }
                }
            }

            if(keepPos && area) {
                if(wasNearBottom) {
                    area.scrollTop = area.scrollHeight;
                } else if(oldScrollTop > 0 && hasNewMessages) {
                    area.scrollTop = oldScrollTop + (area.scrollHeight - oldScrollHeight);
                }
            }

            // Проверяем видимые сообщения для отметки прочитанных
            setTimeout(checkVisibleMessages, 100);

        } catch(e) { console.error(e); }
    }

    async function sendMessage() {
        const text = document.getElementById('messageText').value.trim();
        if(!text || !selectedUser) return;

        const tempId = 'temp_' + Date.now();
        const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const area = document.getElementById('messagesArea');

        const tempHtml = `
            <div class="message sent" data-temp="${tempId}">
                <div class="message-bubble">${escapeHtml(text)}</div>
                <div class="message-footer">
                    <span class="message-time">${time}</span>
                    <span class="status-icon"><i class="fas fa-circle-notch fa-spin"></i></span>
                </div>
            </div>
        `;
        area.insertAdjacentHTML('beforeend', tempHtml);
        area.scrollTop = area.scrollHeight;
        document.getElementById('messageText').value = '';

        try {
            const res = await fetch(`${API_BASE}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    senderId: currentUser.userId,
                    receiverId: selectedUser.id,
                    text: text
                })
            });

            if(res.ok) {
                document.querySelector(`[data-temp="${tempId}"]`)?.remove();
                await loadMessages(false);

                // Отмечаем как доставленные (но не прочитанные)
                setTimeout(async () => {
                    await callMarkDelivered(currentUser.userId, selectedUser.id);
                    await loadMessages(true);
                }, 500);
            } else {
                const tempSpan = document.querySelector(`[data-temp="${tempId}"] .status-icon`);
                if(tempSpan) tempSpan.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#b91c1c;"></i>';
            }
        } catch(e) { console.error(e); }
    }

    function startPolling() {
        if(pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(async () => {
            if(selectedUser && currentUser) {
                await loadMessages(true);
                // Проверяем доставку
                await callMarkDelivered(currentUser.userId, selectedUser.id);
                // Проверяем прочитанные через видимость
                checkVisibleMessages();
            }
            await loadUsers();
        }, 3000);
    }

    async function signUpRequest(login, email, pwd) {
        try {
            const r = await fetch(`${API_BASE}/signUp`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ username:login, email, password:pwd })
            });
            const d = await r.json();
            if(r.ok) {
                displayMessage('signupMessage', 'Успешно! Теперь войдите.', false);
                setTimeout(() => { document.getElementById('switchToLogin').click(); }, 1300);
            } else displayMessage('signupMessage', d.error || 'Ошибка', true);
        } catch(e) { displayMessage('signupMessage', 'Ошибка сети', true); }
    }

    async function signInRequest(login, pwd) {
        try {
            const r = await fetch(`${API_BASE}/signIn`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ username:login, password:pwd })
            });
            const d = await r.json();
            if(r.ok && d.userId) {
                currentUser = { userId: d.userId, username: d.username };
                localStorage.setItem('tether_session', JSON.stringify(currentUser));
                showMessenger();
                await loadUsers();
                startPolling();
            } else displayMessage('loginMessage', d.message || 'Ошибка входа', true);
        } catch(e) { displayMessage('loginMessage', 'Сетевая ошибка', true); }
    }

    function displayMessage(containerId, msg, isErr) {
        const c = document.getElementById(containerId);
        c.innerHTML = `<div class="${isErr ? 'error-msg' : 'success-msg'}">${msg}</div>`;
        setTimeout(() => c.innerHTML = '', 3000);
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;';
            if(m==='<') return '&lt;';
            if(m==='>') return '&gt;';
            return m;
        });
    }

    function logout() {
        localStorage.clear();
        currentUser = null;
        selectedUser = null;
        readMessageIds.clear();
        if(pollInterval) clearInterval(pollInterval);
        showAuthForms();
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        signInRequest(
            document.getElementById('loginUsername').value.trim(),
            document.getElementById('loginPassword').value
        );
    });

    document.getElementById('signupForm').addEventListener('submit', (e) => {
        e.preventDefault();
        signUpRequest(
            document.getElementById('signupUsername').value.trim(),
            document.getElementById('signupEmail').value.trim(),
            document.getElementById('signupPassword').value
        );
    });

    document.getElementById('switchToSignup').onclick = () => {
        document.getElementById('loginFormCard').classList.add('hidden');
        document.getElementById('signupFormCard').classList.remove('hidden');
    };

    document.getElementById('switchToLogin').onclick = () => {
        document.getElementById('signupFormCard').classList.add('hidden');
        document.getElementById('loginFormCard').classList.remove('hidden');
    };

    document.getElementById('showLoginNavBtn').onclick = () => document.getElementById('switchToLogin').click();
    document.getElementById('showSignupNavBtn').onclick = () => document.getElementById('switchToSignup').click();
    document.getElementById('logoutBtn').onclick = logout;

    loadSession();
</script>
</body>
</html>
